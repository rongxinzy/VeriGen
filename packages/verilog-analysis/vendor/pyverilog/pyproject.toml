[build-system]
requires = ["setuptools==80.9.0"]
build-backend = "setuptools.build_meta"

[project]
name = "pyverilog"
version = "1.3.0+verigen"
description = "Vendored VerilogCoder pyverilog fork with toplogic_tree_traverse."
requires-python = ">=3.11,<3.13"
dependencies = [
    "jinja2==3.1.6",
    "ply==3.11",
]

[tool.setuptools.packages.find]
include = ["pyverilog*"]
