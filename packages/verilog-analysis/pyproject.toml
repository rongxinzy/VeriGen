[build-system]
requires = ["setuptools==80.9.0"]
build-backend = "setuptools.build_meta"

[project]
name = "verigen-verilog-analysis"
version = "0.1.0"
description = "VeriGen managed Python worker for Verilog AST, control-flow, waveform tracing, and sequential element analysis."
readme = "README.md"
requires-python = ">=3.11,<3.13"
dependencies = [
    "jinja2==3.1.6",
    "networkx==3.6.1",
    "numpy==2.4.6",
    "pandas==2.3.3",
    "ply==3.11",
    "pyverilog==1.3.0+verigen",
    "vcdvcd==2.6.0",
]

[project.scripts]
verigen-verilog-analysis = "verilog_analysis.__main__:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.uv.sources]
pyverilog = { path = "vendor/pyverilog", editable = true }
