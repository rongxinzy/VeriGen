<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="gw" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  <!-- Waveform -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="10,70 30,70 30,30 50,30 50,90 70,90 70,50 90,50 90,70 110,70 110,30 130,30 130,90 150,90 150,50 170,50 170,70 190,70" stroke="url(#gw)" stroke-width="3"/>
    <polyline points="10,90 30,90 30,50 50,50 50,110 70,110 70,70 90,70 90,90 110,90 110,50 130,50 130,110 150,110 150,70 170,70 170,90 190,90" stroke="url(#g)" stroke-width="3" opacity="0.5"/>
    <!-- Grid lines -->
    <line x1="10" y1="110" x2="190" y2="110" stroke="#374151" stroke-width="1" opacity="0.3"/>
    <line x1="10" y1="30" x2="190" y2="30" stroke="#374151" stroke-width="1" stroke-dasharray="4,4" opacity="0.2"/>
    <line x1="10" y1="50" x2="190" y2="50" stroke="#374151" stroke-width="1" stroke-dasharray="4,4" opacity="0.2"/>
    <line x1="10" y1="70" x2="190" y2="70" stroke="#374151" stroke-width="1" stroke-dasharray="4,4" opacity="0.2"/>
    <line x1="10" y1="90" x2="190" y2="90" stroke="#374151" stroke-width="1" stroke-dasharray="4,4" opacity="0.2"/>
  </g>
  <!-- Text -->
  <text x="210" y="70" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="url(#g)" letter-spacing="2">Veri</text>
  <text x="325" y="70" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="300" fill="#9ca3af" letter-spacing="2">Gen</text>
  <text x="210" y="95" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#6b7280" letter-spacing="4">VERILOG CODING AGENT</text>
</svg>
